# project.yml — XcodeGen specification
# Resonance — Design for the Exhale
#
# Generate the Xcode project: `xcodegen generate`
# Requires: `brew install xcodegen`

name: Resonance
options:
  bundleIdPrefix: com.resonance
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    watchOS: "11.0"
    visionOS: "2.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:

  # ─── iPhone & iPad ───
  Resonance-iOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resonance.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    resources:
      - path: Assets.xcassets

  # ─── macOS ───
  Resonance-macOS:
    type: application
    platform: macOS
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resonance.app.macos
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
    resources:
      - path: Assets.xcassets

  # ─── watchOS ───
  Resonance-watchOS:
    type: application
    platform: watchOS
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: watchOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resonance.app.watchos
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.resonance.app
    resources:
      - path: Assets.xcassets

  # ─── visionOS ───
  Resonance-visionOS:
    type: application
    platform: visionOS
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: visionOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resonance.app.visionos
    resources:
      - path: Assets.xcassets
